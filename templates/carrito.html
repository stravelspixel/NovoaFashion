<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito - NovoaFashion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav>
        <div class="logo">NovoaFashion</div>
        <ul>
            <li><a href="/">Inicio</a></li>
        </ul>
    </nav>

    <section class="productos">
        <h2>Tu Carrito</h2>

        {% if items %}
        <div class="grid">
            {% for item in items %}
            <div class="card">
                <img src="{{ url_for('static', filename='images/' + item.imagen) }}" alt="{{ item.nombre }}">
                <h3>{{ item.nombre }}</h3>
                <p>${{ item.precio }}</p>
            </div>
            {% endfor %}
        </div>
        <h3 style="text-align:center; margin-top:30px;">Total: ${{ total }}</h3>
        {% else %}
        <p style="text-align:center; margin-top:50px;">Tu carrito está vacío.</p>
        {% endif %}

        <div style="text-align:center; margin-top:30px;">
            <a href="/" class="btn">Seguir comprando</a>
        </div>
    </section>

</body>
</html>
